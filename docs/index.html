<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScoreFrame - Sport Scoreboard</title>
  <meta name="description" content="Overlay scoreboards on sports match videos and export as MP4. Soccer, handball, rugby, hockey and more.">
  <style>
    :root {
      --green: #34c759;
      --green-dark: #248a3d;
      --bg: #000;
      --bg-section: #111;
      --text: #f5f5f7;
      --text-secondary: #a1a1a6;
      --card-bg: #1c1c1e;
      --accent: #30d158;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(180deg, #0a1a0a 0%, #000 50%, #0a0a0a 100%);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(52, 199, 89, 0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .campaign-strip {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: linear-gradient(90deg, #ff9500, #ff375f, #ff9500);
      background-size: 200% 100%;
      animation: stripSlide 3s linear infinite;
      text-align: center;
      padding: 12px 20px;
      font-weight: 700;
      font-size: clamp(0.9em, 2.5vw, 1.1em);
      color: #fff;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    .campaign-strip span {
      background: rgba(255,255,255,0.2);
      padding: 2px 10px;
      border-radius: 6px;
      margin-left: 8px;
      font-size: 0.85em;
    }
    @keyframes stripSlide {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }
    .hero { padding-top: 100px; }
    .hero h1 {
      font-size: clamp(3em, 8vw, 5.5em);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .hero h1 span { color: var(--accent); }
    .hero-sub {
      font-size: clamp(1.1em, 2.5vw, 1.4em);
      color: var(--text-secondary);
      max-width: 500px;
      margin-bottom: 40px;
    }
    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--text);
      color: #000;
      padding: 14px 32px;
      border-radius: 28px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1.05em;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .hero-cta:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 30px rgba(255,255,255,0.15);
    }
    .hero-cta svg { width: 20px; height: 20px; }

    /* Language Switcher */
    .lang-switcher {
      position: fixed;
      top: 52px;
      right: 16px;
      z-index: 101;
      display: flex;
      gap: 4px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 4px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .lang-switcher button {
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.75em;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-switcher button.active {
      background: var(--accent);
      color: #000;
    }
    .lang-switcher button:hover:not(.active) {
      color: var(--text);
    }

    /* Phone Showcase */
    .phone-showcase {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 60px;
      perspective: 1000px;
    }
    .phone-frame {
      width: 200px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08);
      transition: transform 0.4s;
    }
    .phone-frame:hover { transform: translateY(-8px); }
    .phone-frame img {
      width: 100%;
      height: auto;
      display: block;
    }
    .phone-frame:nth-child(1) { transform: rotate(-4deg) translateY(20px); }
    .phone-frame:nth-child(2) { transform: scale(1.08); z-index: 2; }
    .phone-frame:nth-child(3) { transform: rotate(4deg) translateY(20px); }
    .phone-frame:nth-child(1):hover { transform: rotate(-4deg) translateY(12px); }
    .phone-frame:nth-child(2):hover { transform: scale(1.12); }
    .phone-frame:nth-child(3):hover { transform: rotate(4deg) translateY(12px); }

    /* Sections */
    .section {
      padding: 100px 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .section-label {
      text-transform: uppercase;
      font-size: 0.75em;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .section h2 {
      font-size: clamp(2em, 5vw, 3em);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 20px;
    }
    .section-desc {
      font-size: 1.15em;
      color: var(--text-secondary);
      max-width: 600px;
      margin-bottom: 48px;
    }

    /* Feature Showcase (alternating) */
    .showcase-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      margin-bottom: 80px;
    }
    .showcase-row.reverse { direction: rtl; }
    .showcase-row.reverse > * { direction: ltr; }
    .showcase-img {
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 16px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.06);
    }
    .showcase-img img {
      width: 100%;
      height: auto;
      display: block;
    }
    .showcase-text h3 {
      font-size: 1.6em;
      font-weight: 700;
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }
    .showcase-text p {
      color: var(--text-secondary);
      font-size: 1.05em;
      line-height: 1.7;
    }

    /* Feature Grid */
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .feature-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 28px 24px;
      border: 1px solid rgba(255,255,255,0.06);
      transition: border-color 0.3s, transform 0.3s;
    }
    .feature-card:hover {
      border-color: rgba(52, 199, 89, 0.3);
      transform: translateY(-2px);
    }
    .feature-icon {
      font-size: 1.6em;
      margin-bottom: 12px;
    }
    .feature-card h3 {
      font-size: 1.05em;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .feature-card p {
      font-size: 0.9em;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    /* iPad Section */
    .ipad-section {
      background: var(--bg-section);
      border-radius: 24px;
      padding: 60px 40px;
      text-align: center;
      margin: 0 20px;
      max-width: 1100px;
      margin-left: auto;
      margin-right: auto;
    }
    .ipad-frame {
      max-width: 800px;
      margin: 32px auto 0;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .ipad-frame img { width: 100%; display: block; }

    /* Steps */
    .steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      counter-reset: step;
    }
    .step {
      text-align: center;
      counter-increment: step;
    }
    .step::before {
      content: counter(step);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--accent);
      color: #000;
      font-size: 1.2em;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .step h3 {
      font-size: 1em;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .step p {
      font-size: 0.85em;
      color: var(--text-secondary);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 60px 20px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    footer nav {
      margin-bottom: 20px;
    }
    footer nav a {
      color: var(--text-secondary);
      text-decoration: none;
      margin: 0 16px;
      font-size: 0.9em;
      transition: color 0.2s;
    }
    footer nav a:hover { color: var(--text); }
    .copyright {
      font-size: 0.8em;
      color: #555;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .phone-showcase { gap: 12px; }
      .phone-frame { width: 140px; border-radius: 18px; }
      .showcase-row { grid-template-columns: 1fr; gap: 32px; }
      .showcase-row.reverse { direction: ltr; }
      .feature-grid { grid-template-columns: 1fr; }
      .steps { grid-template-columns: 1fr 1fr; }
      .ipad-section { padding: 40px 20px; margin: 0 12px; }
    }
    @media (max-width: 480px) {
      .phone-frame { width: 110px; border-radius: 14px; }
      .steps { grid-template-columns: 1fr; }
    }
  </style>
</head>

  <script>
    const LANGS = ['ja', 'en', 'ko'];
    function setLang(lang) {
      if (!LANGS.includes(lang)) lang = 'ja';
      document.documentElement.lang = lang;
      document.querySelectorAll('.i18n').forEach(el => {
        const text = el.dataset[lang];
        if (text) el.innerHTML = text;
      });
      LANGS.forEach(l => {
        const btn = document.getElementById('lang-' + l);
        if (btn) btn.classList.toggle('active', l === lang);
      });
      try { localStorage.setItem('sf-lang', lang); } catch(e) {}
    }
    // Auto-detect language
    (function() {
      let lang = 'en';
      try { lang = localStorage.getItem('sf-lang'); } catch(e) {}
      if (!lang) {
        const nav = (navigator.language || '').toLowerCase();
        if (nav.startsWith('ja')) lang = 'ja';
        else if (nav.startsWith('ko')) lang = 'ko';
        else lang = 'en';
      }
      setLang(lang);
    })();
  </script>
